<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iConnect Pro</title>
    <style>
        :root {
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; 
            --accent: #007AFF; --border: #D1D1D6; --sub: #8E8E93;
            --green: #34C759; --red: #FF3B30; --sms: #5856D6;
        }
        [data-theme="dark"] {
            --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; --border: #38383A;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; }

        .header {
            padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:1000;
        }

        .container { padding: 15px; }

        .nav-line { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .chip { padding: 10px 18px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }
        .chip.blue { background: var(--accent); color: white; border: none; }

        .input-f { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 12px; background: var(--card); color: var(--text); outline: none; font-size: 15px; }
        
        /* Contact Card */
        .card { background: var(--card); border-radius: 18px; border: 1px solid var(--border); margin-bottom: 15px; overflow: hidden; }
        .card-top { display: flex; align-items: center; padding: 12px; cursor: pointer; }
        .card-top img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; margin-right: 12px; }
        .card-info { flex: 1; }
        .card-info h4 { font-size: 16px; margin-bottom: 2px; }
        .card-info p { font-size: 13px; color: var(--sub); }

        /* Quick Action Bar (Neeche wala line) */
        .quick-actions { display: flex; border-top: 1px solid var(--border); background: rgba(0,0,0,0.02); }
        .qa-btn { flex: 1; padding: 12px; text-align: center; text-decoration: none; font-size: 18px; border-right: 1px solid var(--border); cursor: pointer; }
        .qa-btn:last-child { border-right: none; }
        .qa-btn:active { background: rgba(0,0,0,0.1); }

        .selection-cb { width: 22px; height: 22px; margin-left: 12px; display: none; }

        #action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); padding: 15px 20px; display: none; justify-content: space-between; align-items: center; z-index: 2000; }

        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1500; display: none; overflow-y: auto; padding: 20px; }
        .btn-full { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: white; font-weight: 700; cursor: pointer; margin-top: 10px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        .gallery-img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="font-size: 20px; color: var(--accent);">iConnect</h2>
    <span onclick="toggleTheme()" style="cursor:pointer; font-size: 22px;">🌓</span>
</div>

<div class="container">
    <div class="nav-line">
        <div class="chip blue" onclick="openF()">➕ Add New</div>
        <div class="chip" id="sel-btn" onclick="toggleSel()">☑️ Select</div>
        <div class="chip" onclick="backup()">📥 Download</div>
        <div class="chip" onclick="document.getElementById('imp').click()">📤 Restore</div>
        <input type="file" id="imp" class="hidden" onchange="restore(event)">
    </div>

    <input type="text" id="search" class="input-f" style="border-radius: 25px; padding-left: 20px;" placeholder="🔍 Search name, number, date..." oninput="render()">

    <div id="list"></div>
</div>

<div id="action-bar">
    <div style="display: flex; gap: 10px; align-items: center;">
        <input type="checkbox" id="master-cb" style="width:20px; height:20px;" onclick="checkAll()">
        <span id="count-txt" style="font-weight: bold;">0 Selected</span>
    </div>
    <div style="display: flex; gap: 15px;">
        <button onclick="copyBulk()" style="background:none; border:none; color:var(--accent); font-weight:bold;">📋 Copy</button>
        <button onclick="delBulk()" style="background:none; border:none; color:var(--red); font-weight:bold;">Delete</button>
    </div>
</div>

<div id="form-overlay" class="overlay">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <h2 id="f-title">Save Contact</h2>
        <span onclick="closeF()" style="color: var(--red); font-weight: bold; cursor: pointer;">CLOSE</span>
    </div>
    <input type="text" id="f-name" class="input-f" placeholder="Full Name">
    <input type="number" id="f-phone" class="input-f" placeholder="Phone Number">
    <input type="text" id="f-aadhar" class="input-f" placeholder="ID / Aadhar">
    <input type="email" id="f-email" class="input-f" placeholder="Email Address">
    <textarea id="f-notes" class="input-f" rows="3" placeholder="Notes..."></textarea>
    <div style="display: flex; gap: 10px;">
        <button class="input-f" style="flex:1" onclick="document.getElementById('p-pic').click()">📸 Photo</button>
        <button class="input-f" style="flex:1" onclick="document.getElementById('p-gal').click()">📂 Gallery</button>
    </div>
    <input type="file" id="p-pic" class="hidden" onchange="handleImg('p')">
    <input type="file" id="p-gal" class="hidden" multiple onchange="handleImg('g')">
    <div id="pre-gal" class="gallery-grid"></div>
    <button class="btn-full" onclick="save()">Save Information</button>
</div>

<div id="detail-overlay" class="overlay">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;"><span onclick="closeD()" style="color:var(--accent); font-weight:bold;">← BACK</span></div>
    <div style="text-align: center;">
        <img id="d-img" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent);">
        <h2 id="d-name" style="margin:10px 0 5px;"></h2>
        <p id="d-phone" style="color: var(--sub); margin-bottom:20px;"></p>
        <div style="text-align: left; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
            <p><b>ID:</b> <span id="d-aadhar"></span></p>
            <p><b>Email:</b> <span id="d-mail"></span></p>
            <p><b>Notes:</b> <span id="d-notes"></span></p>
        </div>
        <div id="d-gal" class="gallery-grid"></div>
    </div>
</div>

<script>
    let db;
    let isSelMode = false;
    let curPic = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    let curGal = [];
    let curId = null;

    const req = indexedDB.open("iConnectProDB", 1);
    req.onupgradeneeded = (e) => { db = e.target.result; db.createObjectStore("contacts", { keyPath: "id" }); };
    req.onsuccess = (e) => { db = e.target.result; render(); };

    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === "dark" ? "light" : "dark"; }
    function openF() { document.getElementById('form-overlay').style.display = 'block'; }
    function closeF() { document.getElementById('form-overlay').style.display = 'none'; resetF(); }

    function handleImg(t) {
        const files = t === 'p' ? [document.getElementById('p-pic').files[0]] : document.getElementById('p-gal').files;
        for (let f of files) {
            const r = new FileReader();
            r.onload = (e) => {
                if(t === 'p') curPic = e.target.result;
                else { curGal.push(e.target.result); document.getElementById('pre-gal').innerHTML += `<img src="${e.target.result}" class="gallery-img">`; }
            };
            r.readAsDataURL(f);
        }
    }

    function save() {
        const name = document.getElementById('f-name').value;
        const phone = document.getElementById('f-phone').value;
        if(!name || !phone) return alert("Fill Name/Phone!");
        const data = { id: curId || Date.now(), name, phone, aadhar: document.getElementById('f-aadhar').value || "N/A", email: document.getElementById('f-email').value || "N/A", notes: document.getElementById('f-notes').value || "None", pic: curPic, gallery: curGal, date: new Date().toLocaleString() };
        const tx = db.transaction("contacts", "readwrite");
        tx.objectStore("contacts").put(data).onsuccess = () => { closeF(); render(); };
    }

    function render() {
        const list = document.getElementById('list');
        const q = document.getElementById('search').value.toLowerCase();
        list.innerHTML = "";
        db.transaction("contacts").objectStore("contacts").openCursor(null, "prev").onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const m = cursor.value;
                if (m.name.toLowerCase().includes(q) || m.phone.includes(q)) {
                    list.innerHTML += `
                        <div class="card">
                            <div class="card-top" onclick="rowClick(${m.id})">
                                <img src="${m.pic}">
                                <div class="card-info">
                                    <h4>${m.name}</h4>
                                    <p>${m.phone}</p>
                                </div>
                                <input type="checkbox" class="selection-cb" value="${m.id}" onchange="upCount()" ${isSelMode ? 'style="display:block"' : ''}>
                            </div>
                            <div class="quick-actions" style="${isSelMode ? 'display:none' : ''}">
                                <a href="tel:${m.phone}" class="qa-btn" style="color:var(--accent)">📞</a>
                                <a href="https://wa.me/91${m.phone}" class="qa-btn" style="color:var(--green)">📱</a>
                                <a href="sms:${m.phone}" class="qa-btn" style="color:var(--sms)">💬</a>
                                <div class="qa-btn" onclick="triggerEdit(${m.id})" style="color:var(--text)">✏️</div>
                            </div>
                        </div>`;
                }
                cursor.continue();
            }
        };
    }

    function toggleSel() { isSelMode = !isSelMode; document.getElementById('action-bar').style.display = isSelMode ? 'flex' : 'none'; render(); }
    function rowClick(id) { if(isSelMode) { const cb = document.querySelector(`.selection-cb[value="${id}"]`); cb.checked = !cb.checked; upCount(); } else { showD(id); } }
    function upCount() { const len = document.querySelectorAll('.selection-cb:checked').length; document.getElementById('count-txt').innerText = len + " Selected"; }
    function checkAll() { const m = document.getElementById('master-cb').checked; document.querySelectorAll('.selection-cb').forEach(c => c.checked = m); upCount(); }

    function copyBulk() {
        const cbs = document.querySelectorAll('.selection-cb:checked');
        let txt = "--- iConnect Contacts ---\n\n";
        let count = 0;
        cbs.forEach(cb => {
            db.transaction("contacts").objectStore("contacts").get(Number(cb.value)).onsuccess = (e) => {
                const m = e.target.result;
                txt += `Name: ${m.name}\nPhone: ${m.phone}\nID: ${m.aadhar}\nNotes: ${m.notes}\n\n`;
                count++;
                if(count === cbs.length) { navigator.clipboard.writeText(txt).then(() => alert("Data Copied!")); }
            };
        });
    }

    function triggerEdit(id) {
        db.transaction("contacts").objectStore("contacts").get(id).onsuccess = (e) => {
            const m = e.target.result; curId = id;
            document.getElementById('f-name').value = m.name; document.getElementById('f-phone').value = m.phone;
            document.getElementById('f-aadhar').value = m.aadhar; document.getElementById('f-email').value = m.email;
            document.getElementById('f-notes').value = m.notes; curPic = m.pic; curGal = m.gallery;
            document.getElementById('f-title').innerText = "Edit Contact"; openF();
        };
    }

    function showD(id) {
        db.transaction("contacts").objectStore("contacts").get(id).onsuccess = (e) => {
            const m = e.target.result;
            document.getElementById('d-name').innerText = m.name; document.getElementById('d-phone').innerText = m.phone;
            document.getElementById('d-img').src = m.pic; document.getElementById('d-aadhar').innerText = m.aadhar;
            document.getElementById('d-mail').innerText = m.email; document.getElementById('d-notes').innerText = m.notes;
            const g = document.getElementById('d-gal'); g.innerHTML = "";
            m.gallery.forEach(s => g.innerHTML += `<img src="${s}" class="gallery-img">`);
            document.getElementById('detail-overlay').style.display = 'block';
        };
    }

    function closeD() { document.getElementById('detail-overlay').style.display = 'none'; }
    function backup() { db.transaction("contacts").objectStore("contacts").getAll().onsuccess = (e) => { const blob = new Blob([JSON.stringify(e.target.result)], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "backup.json"; a.click(); }; }
    function restore(event) { const r = new FileReader(); r.onload = (e) => { const list = JSON.parse(e.target.result); const tx = db.transaction("contacts", "readwrite"); list.forEach(i => tx.objectStore("contacts").put(i)); tx.oncomplete = () => { alert("Restored!"); render(); }; }; r.readAsText(event.target.files[0]); }
    function resetF() { curId = null; curPic = "https://cdn-icons-png.flaticon.com/512/149/149071.png"; curGal = []; document.getElementById('pre-gal').innerHTML = ""; document.querySelectorAll('.input-f').forEach(i => i.value=""); }
    function delBulk() { const cbs = document.querySelectorAll('.selection-cb:checked'); if(confirm("Delete selected?")) { const tx = db.transaction("contacts", "readwrite"); cbs.forEach(cb => tx.objectStore("contacts").delete(Number(cb.value))); tx.oncomplete = () => { toggleSel(); render(); }; } }
</script>
</body>
</html>
